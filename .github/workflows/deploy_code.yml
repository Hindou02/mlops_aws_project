name: Deploy Code - Build & Redeploy API

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'data/**'
      - '*.dvc'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Debug host and SSH port
        run: |
          echo "Testing host: ${{ secrets.EC2_HOST }}"
          nc -zv ${{ secrets.EC2_HOST }} 22

      - name: Deploy to EC2
        run: |
          ssh -vvv -o ConnectTimeout=20 -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}"
            export MLFLOW_TRACKING_URI="${{ secrets.MLFLOW_TRACKING_URI }}"

            cd ~/mlflow
            nohup pipenv run mlflow server \
              --host 0.0.0.0 \
              --port 5000 \
              --default-artifact-root s3://24266-buckets \
              --allowed-hosts "*" \
              --cors-allowed-origins "*" > mlflow.log 2>&1 &

            cd ~/mlops_aws_project
            git pull origin main

            sudo docker build -t mlflow-model-api .

            sudo docker stop api_container 2>/dev/null || true
            sudo docker rm api_container 2>/dev/null || true

            sudo docker run -d \
              --name api_container \
              -p 8000:8000 \
              -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
              -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
              -e AWS_DEFAULT_REGION="$AWS_DEFAULT_REGION" \
              -e MLFLOW_TRACKING_URI="$MLFLOW_TRACKING_URI" \
              mlflow-model-api
          ENDSSH

      - name: Health check
        run: |
          sleep 30
          curl --fail http://${{ secrets.EC2_HOST }}:8000/ || exit 1